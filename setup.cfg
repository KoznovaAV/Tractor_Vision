[flake8]
max-line-length = 100
exclude =
    .git,
    __pycache__,
    htmlcov,
    .pytest_cache,
    .mypy_cache,
    data/raw,
    data/processed,
    data/dirty_clean
ignore = E203, W503

[isort]
profile = black
line_length = 100
skip = __pycache__,.mypy_cache,.pytest_cache

[mypy]
python_version = 3.11
warn_return_any = True
warn_unused_configs = True
ignore_missing_imports = True
exclude = __pycache__|htmlcov|.pytest_cache
