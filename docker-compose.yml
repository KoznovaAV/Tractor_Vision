version: '3.8'

services:
  # Обучение Single-Task модели
  train:
    build: .
    command: python -m src.training.train
    volumes:
      - ./data:/app/data
      - ./weights:/app/weights
      - ./output:/app/output
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

  # Обучение Multi-Task модели
  train-multi:
    build: .
    command: python -m src.training.multi_task_train
    volumes:
      - ./data:/app/data
      - ./weights:/app/weights
      - ./output:/app/output
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

  # API сервис
  api:
    build: .
    command: uvicorn src.api.main:app --host 0.0.0.0 --port 8000
    ports:
      - "8000:8000"
    volumes:
      - ./weights:/app/weights:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Запуск тестов
  test:
    build: .
    command: pytest tests/ -v --cov=src
    volumes:
      - ./data:/app/data
      - ./weights:/app/weights
